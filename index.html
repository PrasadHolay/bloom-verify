<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #FFF5F7 0%, #FFFFFF 50%, #FFF8FA 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.15);
            max-width: 320px;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #FF69B4; font-size: 24px; margin-bottom: 12px; }
        p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
        .bloom { color: #FF1493; font-weight: 600; }
        .button {
            display: inline-block;
            background: linear-gradient(90deg, #FF69B4, #FF1493);
            color: white !important;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
        }
        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 13px;
        }
        .debug {
            margin-top: 16px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 10px;
            color: #666;
            word-break: break-all;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" id="icon">✨</div>
        <h1 id="title">You're All Set!</h1>
        <p id="message">Your email has been verified.<br><br>Tap below to open <span class="bloom">Bloom</span>! 🌸</p>
        <a href="bloom://auth/callback" class="button" id="button">Open Bloom</a>
        <p class="footer" id="footer">If the app doesn't open, make sure Bloom is installed.</p>
        <div class="debug" id="debug"></div>
    </div>

    <script>
        // Get params from hash fragment (Supabase puts tokens here)
        const hashString = window.location.hash.substring(1);
        const hashParams = new URLSearchParams(hashString);
        
        // Get params from URL query string (backup)
        const urlParams = new URLSearchParams(window.location.search);
        
        // Check type from both sources
        const type = hashParams.get('type') || urlParams.get('type');
        const accessToken = hashParams.get('access_token') || urlParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token') || urlParams.get('refresh_token');
        
        const isRecovery = type === 'recovery';
        
        // Build the deep link URL
        let appUrl = 'bloom://auth/callback';
        
        if (isRecovery) {
            // PASSWORD RESET flow - include tokens in the URL
            document.getElementById('icon').textContent = '🔐';
            document.getElementById('title').textContent = 'Reset Your Password';
            document.getElementById('message').innerHTML = 
                'Tap below to open <span class="bloom">Bloom</span> and set your new password. 🌸';
            document.getElementById('button').textContent = 'Reset Password';
            
            // Build URL with tokens as query params (more reliable than hash)
            appUrl = 'bloom://reset-password?type=recovery';
            if (accessToken) appUrl += '&access_token=' + encodeURIComponent(accessToken);
            if (refreshToken) appUrl += '&refresh_token=' + encodeURIComponent(refreshToken);
        } else {
            // EMAIL VERIFICATION flow
            if (accessToken) {
                appUrl = 'bloom://auth/callback?access_token=' + encodeURIComponent(accessToken);
                if (refreshToken) appUrl += '&refresh_token=' + encodeURIComponent(refreshToken);
                if (type) appUrl += '&type=' + encodeURIComponent(type);
            }
        }
        
        // Set the button href
        document.getElementById('button').href = appUrl;
        
        // Debug info
        document.getElementById('debug').innerHTML = 
            '<strong>Debug Info:</strong><br>' +
            'Type: ' + (type || 'none') + '<br>' +
            'Has Access Token: ' + (accessToken ? 'Yes' : 'No') + '<br>' +
            'Is Recovery: ' + isRecovery + '<br>' +
            'App URL: ' + appUrl.substring(0, 80) + '...';
        
        console.log('Full App URL:', appUrl);
    </script>
</body>
</html>

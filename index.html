<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #FFF5F7 0%, #FFFFFF 50%, #FFF8FA 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.15);
            max-width: 320px;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #FF69B4; font-size: 24px; margin-bottom: 12px; }
        p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
        .bloom { color: #FF1493; font-weight: 600; }
        .button {
            display: inline-block;
            background: linear-gradient(90deg, #FF69B4, #FF1493);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            cursor: pointer;
            border: none;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
        }
        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 13px;
        }
        .debug {
            margin-top: 16px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
            word-break: break-all;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" id="icon">✨</div>
        <h1 id="title">You're All Set!</h1>
        <p id="message">Your email has been verified.<br><br>Tap below to open <span class="bloom">Bloom</span> and start your beauty journey! 🌸</p>
        <button class="button" id="button" onclick="openApp()">Open Bloom</button>
        <p class="footer">If the button doesn't work, open the Bloom app manually.</p>
        <div class="debug" id="debug"></div>
    </div>

    <script>
        // Get params from URL query string
        const urlParams = new URLSearchParams(window.location.search);
        
        // Get params from hash fragment (Supabase often puts tokens here)
        const hashString = window.location.hash.substring(1);
        const hashParams = new URLSearchParams(hashString);
        
        // Check type from both sources
        const type = urlParams.get('type') || hashParams.get('type');
        const isRecovery = type === 'recovery';
        
        // Build the full hash to pass to the app
        const fullHash = window.location.hash || '';
        const fullSearch = window.location.search || '';
        
        // Debug info (hidden by default)
        document.getElementById('debug').innerHTML = 
            'Type: ' + type + '<br>' +
            'Hash: ' + fullHash.substring(0, 50) + '...<br>' +
            'Search: ' + fullSearch.substring(0, 50) + '...';
        
        let appUrl = 'bloom://auth/callback';
        
        if (isRecovery) {
            // Password Reset flow
            document.getElementById('icon').textContent = '🔐';
            document.getElementById('title').textContent = 'Reset Your Password';
            document.getElementById('message').innerHTML = 
                'You\'re almost there!<br><br>Tap below to open <span class="bloom">Bloom</span> and set your new password. 🌸';
            document.getElementById('button').textContent = 'Reset Password';
            
            // Pass tokens to app via hash fragment
            appUrl = 'bloom://reset-password' + fullHash;
            
            // If tokens are in query string instead, convert to hash
            if (!fullHash && fullSearch) {
                appUrl = 'bloom://reset-password#' + fullSearch.substring(1);
            }
        } else {
            // Email verification - pass any tokens too
            appUrl = 'bloom://auth/callback' + fullHash;
            if (!fullHash && fullSearch) {
                appUrl = 'bloom://auth/callback#' + fullSearch.substring(1);
            }
        }
        
        console.log('App URL:', appUrl);
        
        function openApp() {
            // Try to open the app
            window.location.href = appUrl;
            
            // Show debug info if it doesn't work
            setTimeout(function() {
                document.getElementById('debug').style.display = 'block';
            }, 2000);
        }
        
        // Auto-open app after short delay (optional)
        // setTimeout(openApp, 500);
    </script>
</body>
</html>
